id: b559c536-c42d-460f-8ac9-b4f34c646d6c
name: ci
description: >
  Lint, format check, unit tests with coverage, and coverage threshold
  enforcement. Run locally before pushing to catch issues early.
version: 1
jobs:
  - name: lint
    description: Format and lint checks
    steps:
      - name: fmt
        description: Check code formatting
        task:
          type: model_method
          modelIdOrName: deno-fmt
          methodName: execute
          inputs:
            run: deno fmt --check

      - name: lint
        description: Run linter
        task:
          type: model_method
          modelIdOrName: deno-lint
          methodName: execute
          inputs:
            run: deno lint

  - name: test
    description: Unit tests with coverage
    dependsOn:
      - job: lint
        condition:
          type: succeeded
    steps:
      - name: unit-tests
        description: Run unit tests with coverage collection
        task:
          type: model_method
          modelIdOrName: deno-test
          methodName: execute
          inputs:
            run: deno test --allow-env --allow-read --allow-run --allow-write --coverage=coverage/

      - name: coverage-report
        description: Generate and display coverage summary
        task:
          type: model_method
          modelIdOrName: coverage-report
          methodName: execute
          inputs:
            run: deno coverage coverage/
        dependsOn:
          - step: unit-tests
            condition:
              type: succeeded

      - name: coverage-check
        description: Enforce 100% line, 100% function, 97% branch coverage
        task:
          type: model_method
          modelIdOrName: coverage-check
          methodName: execute
          inputs:
            run: |
              CLEAN=$(deno coverage coverage/ 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep 'All files')
              BRANCH=$(echo "$CLEAN" | awk -F'|' '{print $3}' | tr -d ' ')
              FUNC=$(echo "$CLEAN" | awk -F'|' '{print $4}' | tr -d ' ')
              LINE=$(echo "$CLEAN" | awk -F'|' '{print $5}' | tr -d ' ')
              echo "Coverage — Branch: ${BRANCH}% | Function: ${FUNC}% | Line: ${LINE}%"
              FAIL=0
              if awk "BEGIN{exit(!(${LINE:-0} < 100))}"; then echo "FAIL: Line coverage ${LINE}% < 100%"; FAIL=1; fi
              if awk "BEGIN{exit(!(${FUNC:-0} < 100))}"; then echo "FAIL: Function coverage ${FUNC}% < 100%"; FAIL=1; fi
              if awk "BEGIN{exit(!(${BRANCH:-0} < 97))}"; then echo "FAIL: Branch coverage ${BRANCH}% < 97%"; FAIL=1; fi
              exit $FAIL
        dependsOn:
          - step: coverage-report
            condition:
              type: succeeded
