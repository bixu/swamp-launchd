name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install swamp
        run: |
          curl -fsSL swamp.club/install.sh | sh
          SWAMP_BIN="$(find "$HOME" /usr/local -name swamp -type f 2>/dev/null | head -1)"
          if [ -z "$SWAMP_BIN" ]; then
            echo "swamp binary not found after install" >&2
            exit 1
          fi
          echo "$(dirname "$SWAMP_BIN")" >> "$GITHUB_PATH"
          "$SWAMP_BIN" --version

      - name: Run ci workflow
        run: swamp workflow run ci --json

      - name: Generate lcov report
        if: always()
        run: |
          if [ -d coverage ]; then
            deno coverage coverage/ --lcov --output=coverage/lcov.info
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: ignore

  smoke-test:
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install swamp
        run: |
          curl -fsSL swamp.club/install.sh | sh
          SWAMP_BIN="$(find "$HOME" /usr/local -name swamp -type f 2>/dev/null | head -1)"
          if [ -z "$SWAMP_BIN" ]; then
            echo "swamp binary not found after install" >&2
            exit 1
          fi
          echo "$(dirname "$SWAMP_BIN")" >> "$GITHUB_PATH"
          "$SWAMP_BIN" --version

      - name: Run smoke-test workflow
        run: swamp workflow run smoke-test --json

  publish:
    runs-on: macos-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install swamp
        run: |
          curl -fsSL swamp.club/install.sh | sh
          SWAMP_BIN="$(find "$HOME" /usr/local -name swamp -type f 2>/dev/null | head -1)"
          if [ -z "$SWAMP_BIN" ]; then
            echo "swamp binary not found after install" >&2
            exit 1
          fi
          echo "$(dirname "$SWAMP_BIN")" >> "$GITHUB_PATH"
          "$SWAMP_BIN" --version

      - name: Authenticate with swamp registry
        run: |
          mkdir -p ~/.config/swamp
          cat > ~/.config/swamp/auth.json <<AUTHEOF
          {
            "serverUrl": "https://swamp.club",
            "apiKey": "${SWAMP_ACCESS_TOKEN}",
            "apiKeyId": "ci",
            "username": "bixu"
          }
          AUTHEOF
        env:
          SWAMP_ACCESS_TOKEN: ${{ secrets.SWAMP_ACCESS_TOKEN }}

      - name: Set CalVer version
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          MICRO=${{ github.run_number }}
          VERSION="${TODAY}.${MICRO}"
          echo "Publishing version: ${VERSION}"
          sed -i '' "s/^version: .*/version: \"${VERSION}\"/" manifest.yaml
          cat manifest.yaml

      - name: Publish extension
        run: swamp extension push manifest.yaml -y --json
