name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Unit tests with coverage
        run: deno test --allow-env --allow-read --allow-run --coverage=coverage/

      - name: Generate coverage report
        run: deno coverage coverage/ --lcov --output=coverage/lcov.info

      - name: Coverage summary
        run: deno coverage coverage/

      - name: Check coverage threshold (95%)
        run: |
          COVERAGE=$(deno coverage coverage/ 2>&1 | tail -1 | grep -oE '[0-9]+\.[0-9]+%' | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 95" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 95% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/lcov.info

  smoke-test:
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install swamp
        run: |
          curl -fsSL swamp.club/install.sh | sh
          SWAMP_BIN="$(find "$HOME" /usr/local -name swamp -type f 2>/dev/null | head -1)"
          if [ -z "$SWAMP_BIN" ]; then
            echo "swamp binary not found after install" >&2
            exit 1
          fi
          echo "$(dirname "$SWAMP_BIN")" >> "$GITHUB_PATH"
          "$SWAMP_BIN" --version

      - name: Register model instances
        run: |
          swamp model create @bixu/launchd smoke-test-daemon \
            --global-arg label=club.swamp.bixu.launchd.smoke-test \
            --global-arg plistPath=fixtures/club.swamp.bixu.launchd.smoke-test.plist \
            --json
          swamp model create @bixu/launchd my-daemons \
            --global-arg label=all \
            --json
          swamp model create @bixu/launchd test-ssh-agent \
            --global-arg label=com.openssh.ssh-agent \
            --json

      - name: Validate workflow
        run: swamp workflow validate smoke-test --json

      - name: Run smoke test
        run: swamp workflow run smoke-test --json

  publish:
    runs-on: macos-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install swamp
        run: |
          curl -fsSL swamp.club/install.sh | sh
          SWAMP_BIN="$(find "$HOME" /usr/local -name swamp -type f 2>/dev/null | head -1)"
          if [ -z "$SWAMP_BIN" ]; then
            echo "swamp binary not found after install" >&2
            exit 1
          fi
          echo "$(dirname "$SWAMP_BIN")" >> "$GITHUB_PATH"
          "$SWAMP_BIN" --version

      - name: Authenticate with swamp registry
        run: |
          mkdir -p ~/.config/swamp
          cat > ~/.config/swamp/auth.json <<AUTHEOF
          {
            "serverUrl": "https://swamp.club",
            "apiKey": "${SWAMP_ACCESS_TOKEN}",
            "apiKeyId": "ci",
            "username": "bixu"
          }
          AUTHEOF
        env:
          SWAMP_ACCESS_TOKEN: ${{ secrets.SWAMP_ACCESS_TOKEN }}

      - name: Publish extension
        run: swamp extension push manifest.yaml -y --json
