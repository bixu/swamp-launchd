name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install swamp
        run: brew install systeminit/tap/swamp

      - name: Run ci workflow
        run: swamp workflow run ci --json

      - name: Show test logs on failure
        if: failure()
        run: |
          find .swamp/outputs -name "*.log" -type f | sort | while read f; do
            echo "=== $f ==="
            cat "$f"
            echo
          done

      - name: Direct test run on failure (debug)
        if: failure()
        run: deno test --allow-env --allow-read --allow-run --allow-write 2>&1 || true

      - name: Generate lcov report
        if: always()
        run: |
          if [ -d coverage ]; then
            deno coverage coverage/ --lcov --output=coverage/lcov.info
          fi

      - name: Post coverage comment
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d coverage ]; then exit 0; fi
          TABLE=$(deno coverage coverage/ 2>&1 | sed 's/\x1b\[[0-9;]*m//g')
          COMMENT="## Test Coverage

          $TABLE

          <sub>Generated by CI from commit ${{ github.sha }}</sub>"

          # Delete previous coverage comment if exists
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## Test Coverage")) | .id' 2>/dev/null | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID -X DELETE 2>/dev/null
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: ignore

  smoke-test:
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install swamp
        run: brew install systeminit/tap/swamp

      - name: Run smoke-test workflow
        run: swamp workflow run smoke-test --json

  publish:
    runs-on: macos-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SWAMP_ACCESS_TOKEN: ${{ secrets.SWAMP_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install swamp
        run: brew install systeminit/tap/swamp

      - name: Run publish workflow
        run: |
          export PUBLISH_VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"
          swamp workflow run publish --json
